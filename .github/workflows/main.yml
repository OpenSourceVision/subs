name: Update Node Subscriptions

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新所有节点'
        required: false
        default: false
        type: boolean
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'Subscriptions.yaml'
      - 'requirements.txt'
      - '.github/workflows/*.yml'

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Set environment variables
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "FORCE_UPDATE=${{ github.event.inputs.force_update == 'true' }}" >> $GITHUB_ENV
        else
          echo "FORCE_UPDATE=false" >> $GITHUB_ENV
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          echo "Installing dependencies from requirements.txt"
          pip install -r requirements.txt
        else
          echo "requirements.txt not found, installing basic dependencies"
          pip install requests PyYAML urllib3 chardet
        fi

    - name: Check if subscriptions file exists
      run: |
        if [ ! -f "Subscriptions.yaml" ]; then
          echo "Error: Subscriptions.yaml file not found!"
          exit 1
        fi
        echo "Subscriptions.yaml file found, contains $(wc -l < Subscriptions.yaml) lines"

    - name: Run node subscription manager
      timeout-minutes: 15
      run: |
        echo "Starting node subscription update..."
        echo "Force update mode: $FORCE_UPDATE"
        python main.py 2>&1 | tee -a update.log
        exit_code=${PIPESTATUS[0]}
        echo "Node subscription update completed with exit code $exit_code"
        if [ $exit_code -ne 0 ]; then
          echo "Error: main.py failed with exit code $exit_code"
          exit $exit_code
        fi
      env:
        PYTHONUNBUFFERED: 1

    - name: Check for changes
      id: check_changes
      run: |
        if [ -f "Node.txt" ]; then
          echo "Node.txt file exists with $(wc -l < Node.txt) lines"
          if [ ! -s "Node.txt" ]; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "Node.txt file is empty"
          elif git diff --quiet HEAD -- Node.txt; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in Node.txt file"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in Node.txt file"
          fi
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "Node.txt file not found"
        fi

    - name: Truncate large log file
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        if [ -f "update.log" ]; then
          if command -v stat >/dev/null 2>&1; then
            if stat -c%s update.log >/dev/null 2>&1; then
              file_size=$(stat -c%s update.log)
            elif stat -f%z update.log >/dev/null 2>&1; then
              file_size=$(stat -f%z update.log)
            else
              file_size=0
            fi
            if [ "$file_size" -gt 1048576 ]; then
              echo "Truncating update.log (size: $file_size bytes) to last 1000 lines"
              tail -n 1000 update.log > update.log.tmp
              mv update.log.tmp update.log
            else
              echo "Log file size: $file_size bytes (no truncation needed)"
            fi
          fi
        fi

    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Node.txt
        if [ -f "update.log" ]; then
          git add update.log
        fi
        node_count=$(wc -l < Node.txt 2>/dev/null || echo "0")
        commit_message="🔄 Auto-update nodes: $node_count nodes (${{ github.event_name }}, force_update=$FORCE_UPDATE)"
        git commit -m "$commit_message" -m "Updated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        for i in {1..3}; do
          echo "Attempting to push changes (attempt $i/3)"
          if git push origin HEAD; then
            echo "Successfully pushed changes"
            break
          else
            echo "Push failed, attempt $i/3"
            if [ $i -lt 3 ]; then
              sleep 5
              if git pull --rebase origin HEAD; then
                echo "Successfully rebased"
              else
                echo "Rebase failed, creating a pull request branch"
                BRANCH_NAME="auto-update-$(date +%Y%m%d%H%M%S)"
                git checkout -b $BRANCH_NAME
                git push origin $BRANCH_NAME
                echo "Please open a Pull Request to merge $BRANCH_NAME into main"
                break
              fi
            else
              echo "Failed to push after 3 attempts"
              exit 1
            fi
          fi
        fi

    - name: Create summary
      if: always()
      run: |
        echo "## 📊 Node Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "Node.txt" ]; then
          node_count=$(wc -l < Node.txt 2>/dev/null || echo "0")
          if [ "$node_count" -gt 0 ]; then
            echo "✅ **Nodes processed:** $node_count" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Nodes processed:** 0 (empty file)" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ **No nodes file generated**" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🕐 **Update time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "🔄 **Workflow run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "📋 **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "⚡ **Force update:** $FORCE_UPDATE" >> $GITHUB_STEP_SUMMARY
        if [ -f "update.log" ] && [ -s "update.log" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Recent Log Entries" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          tail -n 20 update.log >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Log Status" >> $GITHUB_STEP_SUMMARY
          echo "No log entries found or log file is empty" >> $GITHUB_STEP_SUMMARY
        fi

  cleanup:
    runs-on: ubuntu-latest
    needs: update-nodes
    if: success()
    permissions:
      actions: write

    steps:
    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 10
